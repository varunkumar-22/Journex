<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Journals</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
  <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="logo">My Journals</h1>
      <nav class="nav">
        <button type="button" class="btn btn-ghost" data-view="list">All entries</button>
        <button type="button" class="btn btn-primary" data-action="new">New entry</button>
      </nav>
    </header>

    <main class="main">
      <!-- List view -->
      <section id="view-list" class="view view-list">
        <div class="list-header">
          <h2>Your entries</h2>
          <p class="subtitle">Click an entry to edit. Sorted by date.</p>
        </div>
        <div id="journal-list" class="journal-list">
          <div id="list-loading" class="loading">Loading…</div>
          <div id="list-empty" class="empty-state" hidden>
            <p>No entries yet.</p>
            <button type="button" class="btn btn-primary" data-action="new">Write your first entry</button>
          </div>
        </div>
      </section>

      <!-- Write / Edit view -->
      <section id="view-write" class="view view-write" hidden>
        <div class="write-header">
          <button type="button" class="btn btn-ghost back" data-view="list">← Back</button>
          <div class="write-meta">
            <span id="write-date" class="date-badge"></span>
            <button type="button" id="btn-delete" class="btn btn-danger" hidden>Delete</button>
            <button type="button" id="btn-save" class="btn btn-primary">Save</button>
          </div>
        </div>
        <div class="editor-wrap">
          <input type="text" id="journal-title" class="title-input" placeholder="Title (optional)" maxlength="500" />
          <div class="editor-toolbar-wrap">
            <div id="editor-toolbar" class="ql-toolbar ql-snow">
              <span class="ql-formats">
                <button type="button" class="ql-bold" title="Bold"></button>
                <button type="button" class="ql-italic" title="Italic"></button>
                <button type="button" class="ql-underline" title="Underline"></button>
                <button type="button" class="ql-strike" title="Strikethrough"></button>
              </span>
              <span class="ql-formats">
                <button type="button" class="ql-list" value="ordered" title="Numbered list"></button>
                <button type="button" class="ql-list" value="bullet" title="Bullet list"></button>
              </span>
              <span class="ql-formats">
                <button type="button" class="ql-link" title="Link"></button>
              </span>
              <span class="ql-formats">
                <button type="button" id="btn-emoji" class="ql-emoji" title="Insert emoji">😀</button>
              </span>
            </div>
          </div>
          <div id="editor" class="editor"></div>
        </div>
        <div id="emoji-picker-container" class="emoji-picker-container" hidden>
          <emoji-picker class="dark"></emoji-picker>
        </div>
      </section>

      <!-- Read-only view -->
      <section id="view-read" class="view view-read" hidden>
        <div class="read-header">
          <button type="button" class="btn btn-ghost back" data-view="list">← Back</button>
          <div class="read-meta">
            <span id="read-date" class="date-badge"></span>
            <button type="button" id="btn-edit" class="btn btn-primary">Edit</button>
          </div>
        </div>
        <div class="read-content">
          <h2 id="read-title" class="read-title"></h2>
          <div id="read-body" class="read-body ql-editor"></div>
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/emoji-picker-element@^1.18.4/index.js" type="module"></script>
  <script src="app.js"></script>
</body>
</html>
